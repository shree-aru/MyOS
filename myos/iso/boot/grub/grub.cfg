# MyOS GRUB Configuration
# Boots kernel with 1024x768x32 graphics mode via Multiboot

set timeout=3
set default=0

menuentry "MyOS - Low Resource Operating System" {
    insmod all_video
    set gfxpayload=1024x768x32
    multiboot /boot/kernel.elf
    boot
}

menuentry "MyOS (Safe Mode - Text Only)" {
    set gfxpayload=text
    multiboot /boot/kernel.elf -- textmode
    boot
}
